ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: books.rostor.local
      paths:
        - path: /
          pathType: Prefix
    - host: books.rostor.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - books.rostor.local
      secretName: komga-tls
    - hosts:
        - books.rostor.cloud
      secretName: komga-cloud-tls

persistence:
  config:
    enabled: true
    existingClaim: komga-config-pvc
  data:
    enabled: true
    existingClaim: media-nfs-pvc
