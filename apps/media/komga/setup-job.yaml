apiVersion: v1
kind: ConfigMap
metadata:
  name: komga-setup
  namespace: komga
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
data:
  setup.sh: |
    #!/bin/sh
    set -e

    URL="${URL:-http://komga.komga.svc.cluster.local:25600}"
    ADMIN_EMAIL="${ADMIN_EMAIL:-admin@home.local}"
    ADMIN_PASSWORD="${ADMIN_PASSWORD:-changeme}"

    echo "Waiting for Komga to be ready..."
    for i in $(seq 1 60); do
      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/api/v2/health" 2>/dev/null || echo "000")
      if [ "${HTTP_CODE}" = "200" ]; then
        echo "Komga is ready!"
        break
      fi
      echo "Waiting... ($i/60) HTTP ${HTTP_CODE}"
      sleep 5
    done

    echo "Checking if an admin user already exists..."
    USERS_RESPONSE=$(curl -s "${URL}/api/v2/users" 2>/dev/null || echo "")
    USER_COUNT=$(echo "${USERS_RESPONSE}" | grep -c '"id"' || true)

    if [ "${USER_COUNT}" -gt 0 ]; then
      echo "Users already exist (${USER_COUNT} found), skipping admin creation."
      exit 0
    fi

    echo "Attempting to register first admin user..."
    # Komga uses a POST to /api/v2/users with admin role
    # First we need a token — on first run there's no auth so we can create a user
    RESPONSE=$(curl -s -X POST "${URL}/api/v2/users" \
      -H "Content-Type: application/json" \
      -d "$(printf '{
        "email": "%s",
        "password": "%s",
        "role": "ADMIN"
      }' "${ADMIN_EMAIL}" "${ADMIN_PASSWORD}")")

    if echo "${RESPONSE}" | grep -q '"id"'; then
      echo "Admin user created successfully!"
    elif echo "${RESPONSE}" | grep -q 'already\|exists\|409\|400'; then
      echo "Admin user may already exist. Response: ${RESPONSE}"
    else
      echo "Response: ${RESPONSE}"
      echo "Note: First admin may need to be created through the web UI at first login."
    fi

    echo ""
    echo "======================================================="
    echo "  KOMGA SETUP"
    echo "======================================================="
    echo "  URL:      https://komga.home"
    echo "  Email:    ${ADMIN_EMAIL}"
    echo "  Password: ${ADMIN_PASSWORD}"
    echo "======================================================="
---
apiVersion: batch/v1
kind: Job
metadata:
  name: komga-setup
  namespace: komga
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: setup
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              source /scripts/setup.sh
          env:
            - name: ADMIN_EMAIL
              value: "admin@home.local"
            - name: ADMIN_PASSWORD
              value: "changeme"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: komga-setup
  ttlSecondsAfterFinished: 3600
