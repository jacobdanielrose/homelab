ingress:
  enabled: true
  className: traefik
  hosts:
    - host: audiobooks.rostor.cloud
      paths:
        - path: /
          pathType: Prefix
    # - host: audiobooks.rostor.cloud
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls:
    - hosts:
        - audiobooks.rostor.cloud
      secretName: audiobooks-cloud-tls
    # - hosts:
    #     - audiobooks.rostor.cloud
    #   secretName: audiobooks-cloud-tls

audiobookshelf:
  backup:
    persistence:
      existingClaim: audiobookshelf-backup-pvc
  config:
    persistence:
      existingClaim: audiobookshelf-config-pvc
  library:
    persistence:
      existingClaim: media-nfs-pvc
  metadata:
    persistence:
      existingClaim: audiobookshelf-metadata-pvc

extraEnv:
  - name: NODE_TLS_REJECT_UNAUTHORIZED
    value: "0"
