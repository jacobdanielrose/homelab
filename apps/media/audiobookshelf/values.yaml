ingress:
  enabled: true
  className: traefik
  hosts:
    - host: audiobooks.home
      paths:
        - path: /
          pathType: Prefix
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
  tls:
    - hosts:
        - audiobooks.home
      secretName: audiobooks-tls

audiobookshelf:
  backup:
    persistence:
      existingClaim: audiobookshelf-backup-pvc
  config:
    persistence:
      existingClaim: audiobookshelf-config-pvc
  library:
    persistence:
      existingClaim: media-nfs-pvc
  metadata:
    persistence:
      existingClaim: audiobookshelf-metadata-pvc
