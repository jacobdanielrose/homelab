ingress:
  enabled: true
  className: traefik
  hosts:
    - host: audiobooks.home.example.com
      paths:
        - path: /
          pathType: Prefix

audiobookshelf:
  config:
    persistence:
      existingClaim: audiobookshelf-config-pvc
  library:
    persistence:
      existingClaim: media-nfs-pvc
