ingress:
  enabled: true
  className: traefik
  hosts:
    - host: audiobooks.rostor.local
      paths:
        - path: /
          pathType: Prefix
    # - host: audiobooks.rostor.cloud
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls:
    - hosts:
        - audiobooks.rostor.local
      secretName: audiobooks-tls
    # - hosts:
    #     - audiobooks.rostor.cloud
    #   secretName: audiobooks-cloud-tls

audiobookshelf:
  backup:
    persistence:
      existingClaim: audiobookshelf-backup-pvc
  config:
    persistence:
      existingClaim: audiobookshelf-config-pvc
  library:
    persistence:
      existingClaim: media-nfs-pvc
  metadata:
    persistence:
      existingClaim: audiobookshelf-metadata-pvc

workload:
  main:
    podSpec:
      hostAliases:
        - ip: "10.107.160.137"
          hostnames:
            - "authentik.rostor.local"
