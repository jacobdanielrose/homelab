apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: audiobooks-tls
  namespace: audiobookshelf
spec:
  secretName: audiobooks-tls
  dnsNames:
    - audiobooks.rostor.local
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
