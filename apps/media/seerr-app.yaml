apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seerr
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: oci://ghcr.io/seerr-team/seerr/seerr-chart
      chart: seerr-chart
      targetRevision: 3.6.0
      helm:
        valueFiles:
          - $values/apps/media/seerr/values.yaml
    - repoURL: https://github.com/jacobdanielrose/homelab.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/jacobdanielrose/homelab.git
      targetRevision: HEAD
      path: apps/media/seerr
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
