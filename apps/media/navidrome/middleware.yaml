apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: navidrome-auth
  namespace: navidrome
spec:
  forwardAuth:
    address: http://ak-outpost-authentik-embedded-outpost.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: navidrome-headers
  namespace: navidrome
spec:
  headers:
    customRequestHeaders:
      X-authentik-username: ""
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: navidrome-auth-chain
  namespace: navidrome
spec:
  chain:
    middlewares:
      - name: navidrome-headers
      - name: navidrome-auth
