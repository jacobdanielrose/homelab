apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: navidrome-tls
  namespace: navidrome
spec:
  secretName: navidrome-tls
  dnsNames:
    - music.rostor.local
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
