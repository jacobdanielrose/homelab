---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: navidrome-cloud-tls
  namespace: navidrome
spec:
  secretName: navidrome-cloud-tls
  dnsNames:
    - music.rostor.cloud
    - subsonic.rostor.cloud
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer