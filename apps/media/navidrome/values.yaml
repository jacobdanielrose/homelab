ingress:
  main:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: music.rostor.local
        paths:
          - path: /
            pathType: Prefix
      - host: music.rostor.cloud
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - music.rostor.local
        secretName: navidrome-tls
      - hosts:
          - music.rostor.cloud
        secretName: navidrome-cloud-tls

persistence:
  data:
    enabled: true
    existingClaim: navidrome-data-pvc
  music:
    enabled: true
    existingClaim: media-nfs-pvc
