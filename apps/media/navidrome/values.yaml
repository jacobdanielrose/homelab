ingress:
  main:
    enabled: true
    className: traefik
    hosts:
      - host: music.rostor.local
        paths:
          - path: /
            pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
    tls:
      - hosts:
          - music.rostor.local
        secretName: navidrome-tls

persistence:
  data:
    enabled: true
    existingClaim: navidrome-data-pvc
  music:
    enabled: true
    existingClaim: media-nfs-pvc
