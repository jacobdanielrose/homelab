apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://jellyfin.github.io/jellyfin-helm
    chart: jellyfin
    targetRevision: 0.3.0 # pick your version
    helm:
      releaseName: jellyfin
      values: |
        ingress:
          enabled: true
          hosts:
            - name: "jellyfin.home.example.com"
              paths:
                - path: /
                  pathType: Prefix
          ingressClassName: "traefik"
        persistence:
          config:
            enabled: true
            size: 5Gi
            storageClass: standard
          media:
            enabled: true
            size: 1Gi
            storageClass: standard
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
