ingress:
  enabled: true
  className: "traefik"
  hosts:
    - host: "jellyfin.home"
      paths:
        - path: /
          pathType: Prefix
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
  tls:
    - hosts:
        - jellyfin.home
      secretName: jellyfin-tls

persistence:
  config:
    enabled: true
    existingClaim: jellyfin-config-pvc
  media:
    enabled: true
    existingClaim: media-nfs-pvc
  cache:
    enabled: true
    existingClaim: jellyfin-cache-pvc

extraInitContainers:
  - name: install-sso-plugin
    image: alpine:latest
    command:
      - sh
      - -c
      - |
        set -e

        PLUGIN_DIR="/config/plugins/SSO-Authentication"
        CONFIG_DIR="/config/plugins/configurations"
        CONFIG_FILE="${CONFIG_DIR}/SSO-Auth.xml"
        SYSXML="/config/config/system.xml"

        # ---------- SSO Plugin ----------
        if [ ! -f "${PLUGIN_DIR}/Jellyfin.Plugin.SSO_Auth.dll" ]; then
          echo "Downloading SSO plugin..."
          mkdir -p "${PLUGIN_DIR}"
          apk add --no-cache unzip curl >/dev/null 2>&1
          curl -fsSL -o /tmp/plugin.zip \
            "https://github.com/9p4/jellyfin-plugin-sso/releases/download/v4.0.0.4/sso-authentication_4.0.0.4.zip"
          unzip -o /tmp/plugin.zip -d "${PLUGIN_DIR}/"
          rm /tmp/plugin.zip
          echo "SSO plugin installed."
        fi

        # ---------- SSO Config ----------
        if [ ! -f "${CONFIG_FILE}" ]; then
          echo "Creating SSO-Auth.xml with placeholder config..."
          mkdir -p "${CONFIG_DIR}"
          echo '<?xml version="1.0" encoding="utf-8"?>' > "${CONFIG_FILE}"
          echo '<PluginConfiguration xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">' >> "${CONFIG_FILE}"
          echo '  <SamlConfigs />' >> "${CONFIG_FILE}"
          echo '  <OidConfigs>' >> "${CONFIG_FILE}"
          echo '    <item>' >> "${CONFIG_FILE}"
          echo '      <key><string>authentik</string></key>' >> "${CONFIG_FILE}"
          echo '      <value>' >> "${CONFIG_FILE}"
          echo '        <OidEndpoint>https://authentik.home/application/o/jellyfin/.well-known/openid-configuration</OidEndpoint>' >> "${CONFIG_FILE}"
          echo '        <OidClientId>CHANGE_ME</OidClientId>' >> "${CONFIG_FILE}"
          echo '        <OidSecret>CHANGE_ME</OidSecret>' >> "${CONFIG_FILE}"
          echo '        <Enabled>true</Enabled>' >> "${CONFIG_FILE}"
          echo '        <EnableAllFolders>true</EnableAllFolders>' >> "${CONFIG_FILE}"
          echo '        <OidScopes>' >> "${CONFIG_FILE}"
          echo '          <string>openid</string>' >> "${CONFIG_FILE}"
          echo '          <string>profile</string>' >> "${CONFIG_FILE}"
          echo '          <string>email</string>' >> "${CONFIG_FILE}"
          echo '        </OidScopes>' >> "${CONFIG_FILE}"
          echo '        <NewPath>true</NewPath>' >> "${CONFIG_FILE}"
          echo '        <DisableHttps>false</DisableHttps>' >> "${CONFIG_FILE}"
          echo '        <DisablePushedAuthorization>false</DisablePushedAuthorization>' >> "${CONFIG_FILE}"
          echo '        <DoNotValidateEndpoints>false</DoNotValidateEndpoints>' >> "${CONFIG_FILE}"
          echo '        <DoNotValidateIssuerName>false</DoNotValidateIssuerName>' >> "${CONFIG_FILE}"
          echo '        <DoNotLoadProfile>false</DoNotLoadProfile>' >> "${CONFIG_FILE}"
          echo '        <CanonicalLinks />' >> "${CONFIG_FILE}"
          echo '      </value>' >> "${CONFIG_FILE}"
          echo '    </item>' >> "${CONFIG_FILE}"
          echo '  </OidConfigs>' >> "${CONFIG_FILE}"
          echo '</PluginConfiguration>' >> "${CONFIG_FILE}"
          echo "SSO config created. Replace CHANGE_ME values then restart the pod."
        fi

        # ---------- Skip wizard ----------
        if [ ! -f "${SYSXML}" ]; then
          echo "Creating system.xml to skip first-run wizard..."
          mkdir -p "$(dirname "${SYSXML}")"
          echo '<?xml version="1.0" encoding="utf-8"?>' > "${SYSXML}"
          echo '<ServerConfiguration>' >> "${SYSXML}"
          echo '  <IsStartupWizardCompleted>true</IsStartupWizardCompleted>' >> "${SYSXML}"
          echo '  <EnableRemoteAccess>true</EnableRemoteAccess>' >> "${SYSXML}"
          echo '  <PreferredMetadataLanguage>en</PreferredMetadataLanguage>' >> "${SYSXML}"
          echo '  <MetadataCountryCode>CH</MetadataCountryCode>' >> "${SYSXML}"
          echo '  <UICulture>en-US</UICulture>' >> "${SYSXML}"
          echo '</ServerConfiguration>' >> "${SYSXML}"
          echo "Wizard skipped. First user to login becomes admin."
        fi
    volumeMounts:
      - name: config
        mountPath: /config
