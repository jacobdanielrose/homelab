ingress:
  enabled: true
  className: "traefik"
  hosts:
    - host: "jellyfin.rostor.cloud"
      paths:
        - path: /
          pathType: Prefix
    # - host: "jellyfin.rostor.cloud"
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls:
    - hosts:
        - jellyfin.rostor.cloud
      secretName: jellyfin-cloud-tls
    # - hosts:
    #     - jellyfin.rostor.cloud
    #   secretName: jellyfin-cloud-tls

jellyfin:
  env:
    - name: DOTNET_USE_POLLING_FILE_WATCHER
      value: "1"

persistence:
  config:
    enabled: true
    existingClaim: jellyfin-config-pvc
  media:
    enabled: true
    existingClaim: media-nfs-pvc
  cache:
    enabled: true
    existingClaim: jellyfin-cache-pvc
