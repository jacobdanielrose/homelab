ingress:
  enabled: true
  className: "traefik"
  hosts:
    - host: "jellyfin.home"
      paths:
        - path: /
          pathType: Prefix
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
  tls:
    - hosts:
        - jellyfin.home
      secretName: jellyfin-tls

persistence:
  config:
    enabled: true
    existingClaim: jellyfin-config-pvc
  media:
    enabled: true
    existingClaim: media-nfs-pvc
  cache:
    enabled: true
    existingClaim: jellyfin-cache-pvc

extraInitContainers:
  - name: install-sso-plugin
    image: alpine:latest
    command:
      - sh
      - -c
      - |
        set -e

        PLUGIN_DIR="/config/plugins/SSO-Authentication"
        CONFIG_DIR="/config/plugins/configurations"
        CONFIG_FILE="${CONFIG_DIR}/SSO-Auth.xml"
        SYSXML="/config/config/system.xml"

        # ---------- SSO Plugin ----------
        if [ ! -f "${PLUGIN_DIR}/Jellyfin.Plugin.SSO_Auth.dll" ]; then
          echo "Downloading SSO plugin..."
          mkdir -p "${PLUGIN_DIR}"
          apk add --no-cache unzip curl >/dev/null 2>&1
          curl -fsSL -o /tmp/plugin.zip \
            "https://github.com/9p4/jellyfin-plugin-sso/releases/download/v4.0.0.4/sso-authentication_4.0.0.4.zip"
          unzip -o /tmp/plugin.zip -d "${PLUGIN_DIR}/"
          rm /tmp/plugin.zip
          echo "SSO plugin installed."
        fi

        # ---------- SSO Config ----------
        if [ ! -f "${CONFIG_FILE}" ]; then
          echo "Creating SSO-Auth.xml with placeholder config..."
          mkdir -p "${CONFIG_DIR}"
          cat > "${CONFIG_FILE}" << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<PluginConfiguration xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <SamlConfigs />
  <OidConfigs>
    <item>
      <key>
        <string>authentik</string>
      </key>
      <value>
        <OidEndpoint>https://authentik.home/application/o/jellyfin/.well-known/openid-configuration</OidEndpoint>
        <OidClientId>CHANGE_ME</OidClientId>
        <OidSecret>CHANGE_ME</OidSecret>
        <Enabled>true</Enabled>
        <EnableAllFolders>true</EnableAllFolders>
        <OidScopes>
          <string>openid</string>
          <string>profile</string>
          <string>email</string>
        </OidScopes>
        <NewPath>true</NewPath>
        <DisableHttps>false</DisableHttps>
        <DisablePushedAuthorization>false</DisablePushedAuthorization>
        <DoNotValidateEndpoints>false</DoNotValidateEndpoints>
        <DoNotValidateIssuerName>false</DoNotValidateIssuerName>
        <DoNotLoadProfile>false</DoNotLoadProfile>
        <CanonicalLinks />
      </value>
    </item>
  </OidConfigs>
</PluginConfiguration>
XMLEOF
          echo "SSO config created. Replace CHANGE_ME values then restart the pod."
        fi

        # ---------- Skip wizard ----------
        if [ ! -f "${SYSXML}" ]; then
          echo "Creating system.xml to skip first-run wizard..."
          mkdir -p "$(dirname "${SYSXML}")"
          cat > "${SYSXML}" << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<ServerConfiguration>
  <IsStartupWizardCompleted>true</IsStartupWizardCompleted>
  <EnableRemoteAccess>true</EnableRemoteAccess>
  <PreferredMetadataLanguage>en</PreferredMetadataLanguage>
  <MetadataCountryCode>US</MetadataCountryCode>
  <UICulture>en-US</UICulture>
</ServerConfiguration>
XMLEOF
          echo "Wizard skipped. First user to login becomes admin."
        fi
    volumeMounts:
      - name: config
        mountPath: /config
