ingress:
  enabled: true
  className: "traefik"
  hosts:
    - host: "jellyfin.rostor.local"
      paths:
        - path: /
          pathType: Prefix
    - host: "jellyfin.rostor.cloud"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - jellyfin.rostor.local
      secretName: jellyfin-tls
    - hosts:
        - jellyfin.rostor.cloud
      secretName: jellyfin-cloud-tls

persistence:
  config:
    enabled: true
    existingClaim: jellyfin-config-pvc
  media:
    enabled: true
    existingClaim: media-nfs-pvc
  cache:
    enabled: true
    existingClaim: jellyfin-cache-pvc
