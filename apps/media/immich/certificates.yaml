---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: immich-cloud-tls
  namespace: immich
spec:
  secretName: immich-cloud-tls
  dnsNames:
    - photos.rostor.cloud
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer