ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: immich.home

controllers:
  main:
    containers:
      main:
        env:
          DB_HOSTNAME: immich-postgres
          DB_USERNAME: immich
          DB_PASSWORD: immich
          DB_DATABASE_NAME: immich
          REDIS_HOSTNAME: immich-valkey

immich:
  persistence:
    library:
      existingClaim: immich-library

valkey:
  enabled: true
