apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: navidrome
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://oci.trueforge.org/truecharts/navidrome
    chart: navidrome
    targetRevision: 23.4.0
    #helm:
    # valueFiles:
    #  - apps/media/navidrome/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
