ingress:
  main:
    enabled: true
    className: traefik
    hosts:
      - host: bookbounty.rostor.internal
        paths:
          - path: /
            pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
    tls:
      - hosts:
          - bookbounty.rostor.internal
        secretName: bookbounty-tls

controllers:
  main:
    pod:
      securityContext:
        fsGroup: 1000
    containers:
      main:
        image:
          repository: thewicklowwolf/bookbounty
          tag: latest
        env:
          TZ: Europe/Zurich
          PUID: "1000"
          PGID: "1000"
          readarr_address: http://readarr.readarr.svc.cluster.local:8787
          readarr_api_key:
            valueFrom:
              secretKeyRef:
                name: arr-api-key
                key: API_KEY
          libgen_address: http://libgen.ee
          sleep_interval: "0"
          sync_schedule: ""
          minimum_match_ratio: "90"
          selected_path_type: folder
          search_type: fiction
          library_scan_on_completion: "True"
          request_timeout: "120"
          thread_limit: "1"
          selected_language: English

service:
  main:
    controller: main
    ports:
      http:
        port: 5000

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: longhorn
    size: 1Gi
    globalMounts:
      - path: /bookbounty/config
  media:
    type: persistentVolumeClaim
    existingClaim: media-nfs-pvc
    globalMounts:
      - path: /bookbounty/downloads
