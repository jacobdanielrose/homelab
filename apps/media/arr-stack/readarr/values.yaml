ingress:
  main:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: readarr.home
        paths:
          - path: /
            pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
    tls:
      - hosts:
          - readarr.home
        secretName: readarr-tls

controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/linuxserver/readarr
          tag: develop
        env:
          TZ: Etc/UTC
          PUID: "1000"
          PGID: "1000"

service:
  main:
    controller: main
    ports:
      http:
        port: 8787

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: standard
    size: 1Gi
    globalMounts:
      - path: /config
  media:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: standard
    size: 1Gi
    globalMounts:
      - path: /data
