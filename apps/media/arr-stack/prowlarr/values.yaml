ingress:
  main:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: prowlarr.home
        paths:
          - path: /
            pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
    tls:
      - hosts:
          - prowlarr.home
        secretName: prowlarr-tls

controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/linuxserver/prowlarr
          tag: latest
        env:
          TZ: Etc/UTC
          PUID: "1000"
          PGID: "1000"

service:
  main:
    controller: main
    ports:
      http:
        port: 9696

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: local-path
    size: 1Gi
    globalMounts:
      - path: /config
