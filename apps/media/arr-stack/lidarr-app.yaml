apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lidarr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/bjw-s-labs/charts/
    chart: lidarr
    targetRevision: 5.0.1
    #helm:
    #  valueFiles:
    #    - apps/media/arr-stack/lidarr/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
