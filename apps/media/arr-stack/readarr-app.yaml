apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: readarr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/bjw-s-labs/charts
    chart: readarr
    targetRevision: 5.0.1
    #helm:
    #  valueFiles:
    #    - apps/media/arr-stack/readarr/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: readarr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
