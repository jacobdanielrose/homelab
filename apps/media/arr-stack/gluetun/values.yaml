controllers:
  main:
    containers:
      main:
        image:
          repository: qmcgaw/gluetun
          tag: latest
        env:
          TZ: Etc/UTC
          VPN_SERVICE_PROVIDER: custom
          VPN_TYPE: wireguard
          FIREWALL_INPUT_PORTS: "8888,8388,6881,8080"
        envFrom:
          - secretRef:
              name: gluetun-secrets
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
      qbittorrent:
        image:
          repository: ghcr.io/linuxserver/qbittorrent
          tag: latest
        ports:
          - name: http
            containerPort: 8080
        env:
          TZ: Etc/UTC
          PUID: "1000"
          PGID: "1000"
          DOCKER_MODS: ghcr.io/gabe565/linuxserver-mod-vuetorrent

service:
  main:
    controller: main
    ports:
      http:
        port: 8888
      shadowsocks-tcp:
        port: 8388
        protocol: TCP
      shadowsocks-udp:
        port: 8388
        protocol: UDP
  qbittorrent:
    controller: main
    ports:
      http:
        port: 8080

ingress:
  qbittorrent:
    enabled: true
    className: traefik
    hosts:
      - host: downloads.rostor.local
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: qbittorrent
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
    tls:
      - hosts:
          - downloads.rostor.local
        secretName: qbittorrent-tls

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: longhorn
    size: 1Gi
    globalMounts:
      - path: /gluetun
  qbittorrent-config:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: longhorn
    size: 1Gi
    globalMounts:
      - path: /config
  media:
    type: persistentVolumeClaim
    existingClaim: media-nfs-pvc
    globalMounts:
      - path: /data
