apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gluetun
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/bjw-s-labs/charts
    chart: gluetun
    targetRevision: 4.6.2
    #helm:
    #  valueFiles:
    #    - apps/media/arr-stack/gluetun/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
