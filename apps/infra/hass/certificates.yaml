apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hass-tls
  namespace: hass
spec:
  secretName: hass-tls
  dnsNames:
    - ha.rostor.local
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hass-cloud-tls
  namespace: hass
spec:
  secretName: hass-cloud-tls
  dnsNames:
    - ha.rostor.cloud
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
