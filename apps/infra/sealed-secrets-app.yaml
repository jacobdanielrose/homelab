apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
spec:
  destination:
    namespace: sealed-secrets
    server: 'https://kubernetes.default.svc'
  project: default
  source:
    repoURL: 'https://github.com/bitnami-labs/sealed-secrets'
    targetRevision: v0.37.0
    path: ''
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
