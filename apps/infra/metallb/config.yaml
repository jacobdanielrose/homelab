apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: metallb
spec:
  addresses:
    # kind/Docker: unused IPs on the docker bridge network
    # For real hardware: change to your LAN range (e.g. 192.168.1.200-192.168.1.250)
    - 172.18.0.100-172.18.0.200
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2
  namespace: metallb
spec:
  ipAddressPools:
    - homelab-pool
