apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: metallb
spec:
  addresses:
    # Change this IP range to match your LAN subnet before deploying on real hardware
    - 192.168.3.20-192.168.3.30
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2
  namespace: metallb
spec:
  ipAddressPools:
    - homelab-pool
