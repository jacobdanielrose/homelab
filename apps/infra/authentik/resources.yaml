apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-postgresql-pvc
  namespace: authentik
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
  labels:
    blueprints.goauthentik.io/instantiate: "true"
data:
  # This blueprint creates SSO provider + Application for each service.
  # Replace CLIENT_ID and CLIENT_SECRET with values from your Authentik admin UI
  # (they are auto-generated by Authentik; this blueprint shows the real values).
  #
  # To get the real values after the first apply:
  #   1. Check the Authentik admin UI at Providers → jellyfin
  #   2. Or kubectl exec into an authentik pod and run:
  #      python -c "from authentik.providers.oauth2.models import OAuth2Provider; p = OAuth2Provider.objects.get(name='jellyfin'); print(f'ID: {p.client_id}\\nSecret: {p.client_secret}')"
  #   3. Copy those values into the secret: kubectl create secret generic authentik-sso-clients \
  #        --namespace authentik \
  #        --from-literal=jellyfin-id=... \
  #        --from-literal=jellyfin-secret=...
  #
  # On fresh cluster installs, the ID and Secret are auto-generated if not specified.
  # For deterministic values across redeploys, you MUST specify them here.
  jellyfin.yaml: |
    version: 1
    metadata:
      name: Jellyfin SSO Provider
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: jellyfin
        identifiers:
          name: jellyfin
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_id: "__REPLACE_ME__"
          client_secret: "__REPLACE_ME__"
          redirect_uris:
            - matching_mode: strict
              url: https://jellyfin.home/SSO/OID/redirect/authentik
              redirect_uri_type: authorization
          grant_types:
            - authorization_code
            - refresh_token
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      - model: authentik_core.application
        identifiers:
          slug: jellyfin
        attrs:
          provider: !KeyOf jellyfin
          name: Jellyfin
          meta_launch_url: https://jellyfin.home
