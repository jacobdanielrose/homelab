# Authentik SSO Blueprint Template
#
# Copy this into the authentik-blueprints ConfigMap (apps/infra/authentik/resources.yaml)
# for each new application you want to enable SSO for.
#
# Required changes per app:
#   1. Replace all "myapp" references with your app's slug name
#   2. Set redirect_uris.url to your app's SSO callback URL
#   3. Set client_id and client_secret (or leave them to be auto-generated)
#   4. Set meta_launch_url for the tile in Authentik's user interface
#   5. Set the grant_types your app supports

# Jellyfin:
#   callback:  https://jellyfin.rostor.local/SSO/OID/redirect/authentik
#   grant:     authorization_code + refresh_token

# Wiki.js:
#   callback:  https://wiki.rostor.local/login/authentik/callback
#   grant:     authorization_code + refresh_token

# Grafana:
#   callback:  https://grafana.rostor.local/login/generic_oauth
#   grant:     authorization_code + refresh_token

