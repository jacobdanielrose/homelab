# Bootstrap ArgoCD for SOPS decryption
#
# Run once after initial cluster bootstrap:
#
# 1. Create the age key Secret in the argocd namespace:
#    kubectl -n argocd create secret generic sops-age-key \
#      --from-file=keys.txt=$HOME/.config/sops/age/keys.txt
#
# 2. Enable ArgoCD's built-in SOPS support:
#    kubectl -n argocd patch configmap argocd-cm --type merge -p \
#      '{"data": {"sops.enabled": "true"}}'
#
# 3. Restart repo-server to pick up the key:
#    kubectl -n argocd rollout restart deployment argocd-repo-server
#    kubectl -n argocd rollout status deployment argocd-repo-server
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  sops.enabled: "true"
