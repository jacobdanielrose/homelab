# Traefik values

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443

ingressClass:
  enabled: true
  name: traefik
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

api:
  dashboard: true

ingressRoute:
  dashboard:
    enabled: true
    ingressClassName: traefik
    matchRule: Host(`traefik.home`)
    entryPoints:
      - web

metrics:
  prometheus:
    addRoutersLabels: true
    addServicesLabels: true
