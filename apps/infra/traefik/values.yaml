# Traefik values

deployment:
  replicas: 2

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    http:
      tls:
        enabled: true
  metrics:
    port: 9100
    expose:
      default: true
    exposedPort: 9100
    protocol: TCP

ingressClass:
  enabled: true
  name: traefik
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

additionalArguments:
  - --providers.kubernetescrd.allowCrossNamespace=true

api:
  dashboard: true

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.rostor.internal`)
    entryPoints:
      - websecure
    tls:
      secretName: traefik-tls

metrics:
  prometheus:
    addRoutersLabels: true
    addServicesLabels: true
    entryPoint: metrics
    service:
      enabled: true
      labels:
        app.kubernetes.io/instance: traefik
