# Grafana Helm chart values

adminPassword: admin

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - grafana.home

persistence:
  enabled: true
  type: statefulset
  storageClassName: ""
  accessModes: ["ReadWriteOnce"]
  size: 5Gi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-operated.prometheus.svc.cluster.local:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.loki.svc.cluster.local
        isDefault: false
