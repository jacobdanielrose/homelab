# Grafana values

adminUser: admin
adminExistingSecret: grafana-admin
adminPasswordKey: admin-password

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - grafana.rostor.local
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
  tls:
    - hosts:
        - grafana.rostor.local
      secretName: grafana-tls

persistence:
  enabled: true
  type: statefulset
  storageClassName: "local-path"
  accessModes: ["ReadWriteOnce"]
  size: 5Gi

initChownData:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-operated.prometheus.svc.cluster.local:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.loki.svc.cluster.local
        isDefault: false
