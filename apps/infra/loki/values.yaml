# Loki values

global:
  extraArgs:
    - -config.expand-env=true
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  limits_config:
    volume_enabled: true
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      # RustFS S3-compatible object store deployed in this namespace
      endpoint: http://rustfs-svc.loki.svc:9000
      region: us-east-1
      s3ForcePathStyle: true
      insecure: true
      accessKeyId: ${RUSTFS_ACCESS_KEY}
      secretAccessKey: ${RUSTFS_SECRET_KEY}
  existingSecretName: loki-s3-secret
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# Disable the deprecated bundled minio subchart
minio:
  enabled: false

gateway:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: loki.rostor.internal
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - loki.rostor.internal
        secretName: loki-tls

read:
  replicas: 1
  persistence:
    storageClass: longhorn

write:
  replicas: 1
  persistence:
    storageClass: longhorn

backend:
  replicas: 1
  persistence:
    storageClass: longhorn

chunksCache:
  allocatedMemory: 256
