# Loki values

loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      # RustFS S3-compatible object store deployed in this namespace
      endpoint: http://rustfs-svc.loki.svc:9000
      region: us-east-1
      accessKeyId: loki
      secretAccessKey: loki-rustfs-objectstore
      s3ForcePathStyle: true
      insecure: true
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# Disable the deprecated bundled minio subchart
minio:
  enabled: false

gateway:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: loki.home
    tls:
      - hosts:
          - loki.home
        secretName: loki-tls
