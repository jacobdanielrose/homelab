apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sure
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/we-promise/sure.git
      targetRevision: main
      path: charts/sure
      helm:
        valueFiles:
          - $values/apps/productivity/sure/values.yaml
        ignoreMissingValueFiles: true
    - repoURL: https://github.com/jacobdanielrose/homelab.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/jacobdanielrose/homelab.git
      targetRevision: HEAD
      path: apps/productivity/sure
  destination:
    server: https://kubernetes.default.svc
    namespace: sure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
