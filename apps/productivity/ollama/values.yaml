ingress:
  enabled: true
  ingressClassName: traefik
  hosts: 
  - host: ollama.rostor.local
    paths: 
      - path: / 
        pathType: Prefix
  - host: ollama.rostor.cloud
    paths:
      - path: /
        pathType: Prefix
  tls:
    - secretName: ollama-tls
      hosts:
        - ollama.rostor.local
    - secretName: ollama-cloud-tls
      hosts:
        - ollama.rostor.cloud

ollama:
  models:
    pull:
      - tinyllama

persistentVolume:
  enabled: true
  storageClass: local-path
  size: 30Gi
