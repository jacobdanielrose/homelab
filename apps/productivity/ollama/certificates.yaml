---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ollama-cloud-tls
  namespace: ollama
spec:
  secretName: ollama-cloud-tls
  dnsNames:
    - ollama.rostor.cloud
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer