image:
  repository: ghcr.io/stalwartlabs/stalwart
  tag: "v0.16.10"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: mail.rostor.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mail.rostor.cloud
      secretName: mail-cloud-tls

config:
  "@type": RocksDb
  path: /var/lib/stalwart

recovery:
  enabled: true

livenessProbe:
  httpGet:
    path: /healthz/live
    port: http
    httpHeaders:
      - name: "X-Forwarded-For"
        value: "127.0.0.1"
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz/ready
    port: http
    httpHeaders:
      - name: "X-Forwarded-For"
        value: "127.0.0.1"
  initialDelaySeconds: 30
  periodSeconds: 10

persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi

secrets:
  create: false

certificate:
  certmanager:
    enabled: false

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

podSecurityContext:
  runAsUser: 2000
  runAsGroup: 2000
  fsGroup: 2000
