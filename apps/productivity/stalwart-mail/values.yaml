image:
  repository: ghcr.io/stalwartlabs/stalwart
  tag: "v0.16.10"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: mail.rostor.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mail.rostor.cloud
      secretName: mail-cloud-tls

config:
  "@type": "Sqlite"
  host: "mail.rostor.cloud"
  database: "sqlite:///data/stalwart.db"
  authUsername: "admin"
  authSecret:
    "@type": "Value"
    secret: ""

persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi

secrets:
  create: false

certificate:
  certmanager:
    enabled: false

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi
