# apiVersion: cert-manager.io/v1
# kind: Certificate
# metadata:
#   name: nextcloud-tls
#   namespace: nextcloud
# spec:
#   secretName: nextcloud-tls
#   dnsNames:
#     - nextcloud.rostor.local
#   issuerRef:
#     name: selfsigned
