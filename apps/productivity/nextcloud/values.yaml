replicaCount: 1

internalDatabase:
  enabled: false

nextcloud:
  host: nextcloud.rostor.cloud
  username: admin
  existingSecret:
    enabled: true
    secretName: nextcloud-secrets
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password
  trustedDomains:
    - nextcloud.rostor.cloud

persistence:
  enabled: true
  storageClass: longhorn
  size: 5Gi
  nextcloudData:
    enabled: true
    existingClaim: nextcloud-nfs-pvc

phpClientHttpsFix:
  enabled: true
  protocol: https

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
  hosts:
    - host: nextcloud.rostor.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nextcloud-cloud-tls
      hosts:
        - nextcloud.rostor.cloud

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: latest
  auth:
    existingSecret: nextcloud-secrets
    existingSecretPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 8Gi

externalDatabase:
  enabled: true
  type: postgresql
  host: nextcloud-postgresql
  database: nextcloud
  user: nextcloud
  existingSecret:
    enabled: true
    secretName: nextcloud-secrets
    passwordKey: password

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: latest
  auth:
    enabled: true
    existingSecret: nextcloud-secrets
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 1Gi
  replica:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 1Gi
