replicaCount: 1

nextcloud:
  host: nextcloud.home
  username: admin
  password: changeme
  # Uncomment and configure to use an existing secret instead:
  # existingSecret:
  #   enabled: true
  #   secretName: nextcloud-admin
  #   usernameKey: nextcloud-username
  #   passwordKey: nextcloud-password
  trustedDomains:
    - nextcloud.home

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - name: nextcloud.home
      path: /
      tls: []
  tls:
    - secretName: nextcloud-tls
      hosts:
        - nextcloud.home
