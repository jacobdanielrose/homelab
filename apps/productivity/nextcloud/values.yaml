replicaCount: 1

nextcloud:
  host: nextcloud.home
  username: admin
  password: changeme
  # Uncomment and configure to use an existing secret instead:
  # existingSecret:
  #   enabled: true
  #   secretName: nextcloud-admin
  #   usernameKey: nextcloud-username
  #   passwordKey: nextcloud-password
  trustedDomains:
    - nextcloud.home

phpClientHttpsFix:
  enabled: true
  protocol: https

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: selfsigned
  hosts:
    - host: nextcloud.home
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nextcloud-tls
      hosts:
        - nextcloud.home
