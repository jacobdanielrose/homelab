replicaCount: 1

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: wiki.rostor.cloud
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - wiki.rostor.cloud
      secretName: wikijs-cloud-tls

postgresql:
  persistence:
    enabled: true
    storageClass: longhorn
