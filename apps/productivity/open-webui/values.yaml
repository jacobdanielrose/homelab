replicaCount: 1

ingress:
  enabled: false

services:
  enabled: true

persistence:
  enabled: true
  size: 2Gi
  storageClass: longhorn

ollama:
  enabled: false

ollamaUrls:
  - http://ollama.ollama.svc.cluster.local:11434

pipelines:
  enabled: false

websocket:
  enabled: true
  manager: redis
  redis:
    enabled: true

extraEnvVarsSecret: open-webui-secrets

extraEnvVars:
  - name: ENABLE_INITIAL_ADMIN_SIGNUP
    value: "True"
  - name: WEBUI_ADMIN_EMAIL
    value: "admin@home.local"
  - name: WEBUI_ADMIN_NAME
    value: "Admin"
  - name: ENABLE_OAUTH_SIGNUP
    value: "true"
  - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
    value: "true"
  - name: ENABLE_LOGIN_FORM
    value: "true"
  - name: OAUTH_SSL_INSECURE_TRANSPORT
    value: "true"

sso:
  enabled: true
  oidc:
    enabled: true
    clientExistingSecret: open-webui-secrets
    clientIdExistingSecretKey: oidc-client-id
    clientExistingSecretKey: oidc-client-secret
    providerUrl: "https://authentik.rostor.local/application/o/open-webui/.well-known/openid-configuration"
    providerName: "Authentik"
    scopes: "openid email profile"
