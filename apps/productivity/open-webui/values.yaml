replicaCount: 1

ingress:
  enabled: true
  class: traefik
  host: openweb.home
  path: /
  pathType: Prefix

ollama:
  enabled: false

ollamaUrls:
  - http://ollama.ollama.svc.cluster.local:11434

pipelines:
  enabled: false

websocket:
  enabled: true
  manager: redis
  redis:
    enabled: true

extraEnvVars:
  - name: WEBUI_SECRET_KEY
    value: "changeme-to-a-random-secret"
  - name: ENABLE_INITIAL_ADMIN_SIGNUP
    value: "True"
  - name: WEBUI_ADMIN_EMAIL
    value: "admin@home.local"
  - name: WEBUI_ADMIN_PASSWORD
    value: "changeme"
  - name: WEBUI_ADMIN_NAME
    value: "Admin"
