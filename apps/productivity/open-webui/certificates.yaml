apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openwebui-tls
  namespace: open-webui
spec:
  secretName: openwebui-tls
  dnsNames:
    - ai.rostor.local
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
