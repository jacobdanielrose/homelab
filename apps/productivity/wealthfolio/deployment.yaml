apiVersion: apps/v1
kind: Deployment
metadata:
  name: wealthfolio
  namespace: wealthfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wealthfolio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wealthfolio
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: wealthfolio
          image: wealthfolio/wealthfolio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8088
          envFrom:
            - secretRef:
                name: wealthfolio-secrets
          env:
            - name: WF_LISTEN_ADDR
              value: "0.0.0.0:8088"
            - name: WF_DB_PATH
              value: "/data/wealthfolio.db"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            limits:
              memory: 512Mi
            requests:
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wealthfolio-data
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi