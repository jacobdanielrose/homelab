apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wealthfolio
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/jacobdanielrose/homelab.git
      targetRevision: HEAD
      path: apps/productivity/wealthfolio
  destination:
    server: https://kubernetes.default.svc
    namespace: wealthfolio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true