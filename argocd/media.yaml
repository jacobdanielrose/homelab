apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-media
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jacobdanielrose/homelab.git
    targetRevision: main
    path: apps/media
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
