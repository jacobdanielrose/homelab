apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-productivity
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jacobdanielrose/homelab.git
    targetRevision: main
    path: apps/productivity
  destination:
    server: https://kubernetes.default.svc
    namespace: productivity
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
