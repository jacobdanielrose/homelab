apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jacobdanielrose/homelab.git
    targetRevision: main
    path: apps/infra
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
